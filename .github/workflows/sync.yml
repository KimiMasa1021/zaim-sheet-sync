name: zaim-sheet-sync

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 09:00 JST（UTC 00:00）
  workflow_dispatch:        # 手動実行用
    inputs:
      start_date:
        description: '取得開始日 (YYYY-MM-DD)。指定すると当日までの範囲を取得。空なら昨日1日分。'
        required: false
        type: string
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          ZAIM_CONSUMER_KEY: ${{ secrets.ZAIM_CONSUMER_KEY }}
          ZAIM_CONSUMER_SECRET: ${{ secrets.ZAIM_CONSUMER_SECRET }}
          ZAIM_ACCESS_TOKEN: ${{ secrets.ZAIM_ACCESS_TOKEN }}
          ZAIM_ACCESS_TOKEN_SECRET: ${{ secrets.ZAIM_ACCESS_TOKEN_SECRET }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ROUTINE_WEBHOOK_URL: ${{ secrets.ROUTINE_WEBHOOK_URL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: |
          if [ -n "${{ inputs.start_date }}" ]; then
            python src/main.py --start-date "${{ inputs.start_date }}"
          else
            python src/main.py
          fi
